<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>絵文字検索</title>
<style>
  *, *::before, *::after {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
  }

  html, body {
    height: 100%;
    width: 100%;
    overflow: hidden;
    background: #f4f2ee;
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
  }

  #app {
    display: flex;
    flex-direction: column;
    height: 100vh;
    width: 100%;
  }

  /* ── Search bar ── */
  #search-wrap {
    flex-shrink: 0;
    display: flex;
    justify-content: center;
    padding: 22px 40px 18px;
  }

  #search {
    width: 100%;
    max-width: 860px;
    font-size: clamp(18px, 3vw, 28px);
    font-family: inherit;
    padding: 14px 20px;
    border: 2px solid #000;
    background: rgba(255, 255, 255, 0.50);
    border-radius: 0;
    outline: none;
    color: #111;
    letter-spacing: 0.03em;
    box-shadow: 5px 5px 0px rgba(0, 0, 0, 0.50);
    transition: box-shadow 0.1s;
    -webkit-appearance: none;
  }

  #search::placeholder {
    color: #aaa;
    font-size: 0.75em;
    letter-spacing: 0.08em;
  }

  #search:focus {
    box-shadow: 7px 7px 0px rgba(0, 0, 0, 0.50);
  }

  /* ── Status line ── */
  #status {
    flex-shrink: 0;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.12em;
    color: #999;
    padding-bottom: 10px;
    text-transform: uppercase;
  }

  /* ── Grid scroll area ── */
  #grid-wrap {
    flex: 1 1 auto;
    overflow-y: scroll;
    overflow-x: hidden;
    padding: 6px 18px 24px;
    scrollbar-width: none;
  }
  #grid-wrap::-webkit-scrollbar { display: none; }

  #grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }

  /* ── Individual emoji cell ── */
  .cell {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 5px;
  }

  /* ── Emoji display ── */
  .emoji-display {
    font-size: 68px;
    line-height: 1;
    height: 84px;
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
    position: relative;
    cursor: default;
  }

  /* Variant-capable cells: pointer cursor + dashed ring */
  .cell.has-variants .emoji-display {
    cursor: pointer;
  }
  .cell.has-variants .emoji-display::after {
    content: '';
    position: absolute;
    inset: 3px;
    border: 1.5px dashed rgba(0, 0, 0, 0.18);
    pointer-events: none;
  }
  .cell.has-variants .emoji-display:active {
    transform: scale(0.88);
  }

  /* ── Variant dots ── */
  .variant-dots {
    display: flex;
    gap: 4px;
    align-items: center;
    justify-content: center;
    height: 11px;
    flex-wrap: wrap;
    max-width: 100%;
  }

  .vdot {
    width: 8px;
    height: 8px;
    border: 1.5px solid rgba(0, 0, 0, 0.30);
    background: transparent;
    flex-shrink: 0;
    transition: background 0.12s, border-color 0.12s;
  }
  .vdot.active { background: rgba(0,0,0,0.50); border-color: rgba(0,0,0,0.50); }

  /* Skin-tone dot colours: 1=lightest … 5=darkest */
  .vdot[data-tone="1"]        { border-color: #c8956c; }
  .vdot[data-tone="1"].active { background: #FFDBAC; border-color: #b07840; }
  .vdot[data-tone="2"]        { border-color: #b07d4a; }
  .vdot[data-tone="2"].active { background: #F1C27D; border-color: #9a6530; }
  .vdot[data-tone="3"]        { border-color: #9a6b34; }
  .vdot[data-tone="3"].active { background: #E0AC69; border-color: #835520; }
  .vdot[data-tone="4"]        { border-color: #8a5a22; }
  .vdot[data-tone="4"].active { background: #C68642; border-color: #714510; }
  .vdot[data-tone="5"]        { border-color: #6b3f18; }
  .vdot[data-tone="5"].active { background: #8D5524; border-color: #4a2508; }

  /* ── Copy button ── */
  .copy-btn {
    font-size: 9px;
    font-family: inherit;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 600;
    color: #333;
    background: rgba(255, 255, 255, 0.92);
    border: 1.5px solid #000;
    border-radius: 0;
    padding: 4px 6px;
    cursor: pointer;
    box-shadow: 2px 2px 0px rgba(0, 0, 0, 0.50);
    width: 100%;
    max-width: 96px;
    text-align: center;
    -webkit-appearance: none;
    -webkit-tap-highlight-color: transparent;
    transition: box-shadow 0.08s, transform 0.08s;
  }
  .copy-btn:active {
    box-shadow: 1px 1px 0px rgba(0, 0, 0, 0.50);
    transform: translate(1px, 1px);
  }
  .copy-btn.copied {
    color: #000;
    background: rgba(210, 255, 210, 0.95);
  }

  /* ── Empty / error state ── */
  #empty {
    display: none;
    text-align: center;
    color: #bbb;
    font-size: 14px;
    letter-spacing: 0.1em;
    padding-top: 60px;
  }
</style>
</head>
<body>
<div id="app">
  <div id="search-wrap">
    <input id="search" type="text" placeholder="キーワードで絵文字を検索…　例：ハート　笑顔　動物" autocomplete="off" spellcheck="false">
  </div>
  <div id="status">読み込み中…</div>
  <div id="grid-wrap">
    <div id="grid"></div>
    <div id="empty">該当する絵文字が見つかりません</div>
  </div>
</div>

<script>
(async () => {
  const searchEl = document.getElementById('search');
  const gridEl   = document.getElementById('grid');
  const statusEl = document.getElementById('status');
  const emptyEl  = document.getElementById('empty');

  // Skin-tone modifier codepoints, in order lightest→darkest
  const TONES = ['\u{1F3FB}', '\u{1F3FC}', '\u{1F3FD}', '\u{1F3FE}', '\u{1F3FF}'];

  function getToneIndex(s) {
    for (let i = 0; i < TONES.length; i++) {
      if (s.includes(TONES[i])) return i + 1; // 1–5
    }
    return 0; // base (no tone)
  }

  // ── Load both data files in parallel ──
  let allEmoji = [], variantMap = {};
  try {
    const [emojiRes, variantRes] = await Promise.all([
      fetch('./emoji_data.json'),
      fetch('./variant_map.json')
    ]);
    allEmoji   = await emojiRes.json();
    variantMap = await variantRes.json();
  } catch (e) {
    statusEl.textContent = '読み込みエラー — JSON ファイルが見つかりません';
    console.error(e);
    return;
  }

  // variantMap: { "👋": ["👋","👋🏻","👋🏼","👋🏽","👋🏾","👋🏿"], ... }
  // This is authoritative — built from Unicode data, not the keyword JSON.

  statusEl.textContent = allEmoji.length + ' 文字';
  render(allEmoji);

  // ── Search ──
  searchEl.addEventListener('input', () => {
    const raw = searchEl.value.trim();
    if (!raw) {
      statusEl.textContent = allEmoji.length + ' 文字';
      render(allEmoji);
      return;
    }

    const terms = raw.split(/[\s,、　]+/).map(t => t.trim()).filter(Boolean);
    if (!terms.length) { render(allEmoji); return; }

    const results = [];
    for (const entry of allEmoji) {
      let score = 0;
      for (const term of terms) {
        if (entry.k.some(kw => kw.includes(term) || term.includes(kw))) score++;
      }
      if (score > 0) results.push({ entry, score });
    }
    results.sort((a, b) => b.score - a.score);

    const filtered = results.map(r => r.entry);
    statusEl.textContent = filtered.length + ' 文字';
    render(filtered);
  });

  // ── Render grid ──
  function render(list) {
    if (list.length === 0) {
      gridEl.innerHTML = '';
      emptyEl.style.display = 'block';
      return;
    }
    emptyEl.style.display = 'none';

    const frag = document.createDocumentFragment();

    for (const entry of list) {
      // Look up this emoji's cycle in the variant map
      const variants    = variantMap[entry.c]; // array or undefined
      const hasVariants = Array.isArray(variants) && variants.length > 1;

      let currentIdx = 0; // always start at base (index 0)
      const currentChar = () => hasVariants ? variants[currentIdx] : entry.c;

      // ── Cell ──
      const cell = document.createElement('div');
      cell.className = 'cell' + (hasVariants ? ' has-variants' : '');

      // ── Emoji display ──
      const disp = document.createElement('div');
      disp.className = 'emoji-display';
      disp.textContent = currentChar();
      if (hasVariants) {
        disp.title = 'クリックでバリエーション切替 (肌の色など)';
        disp.addEventListener('click', () => {
          currentIdx = (currentIdx + 1) % variants.length;
          disp.textContent = currentChar();
          updateDots(dotsEl, currentIdx);
        });
      }
      cell.appendChild(disp);

      // ── Variant dots (skin-tone indicator) ──
      let dotsEl = null;
      if (hasVariants) {
        dotsEl = document.createElement('div');
        dotsEl.className = 'variant-dots';
        buildDots(dotsEl, variants, currentIdx);
        cell.appendChild(dotsEl);
      }

      // ── COPY button — always copies what is currently displayed ──
      const btn = document.createElement('button');
      btn.className = 'copy-btn';
      btn.textContent = 'COPY';
      btn.addEventListener('click', () => copyChar(currentChar(), btn));
      cell.appendChild(btn);

      frag.appendChild(cell);
    }

    gridEl.innerHTML = '';
    gridEl.appendChild(frag);
    gridEl.parentElement.scrollTop = 0;
  }

  // ── Dot helpers ──
  function buildDots(container, variants, activeIdx) {
    for (let i = 0; i < variants.length; i++) {
      const dot = document.createElement('div');
      dot.className = 'vdot' + (i === activeIdx ? ' active' : '');
      const tone = getToneIndex(variants[i]);
      if (tone > 0) dot.dataset.tone = tone;
      container.appendChild(dot);
    }
  }

  function updateDots(container, activeIdx) {
    container.querySelectorAll('.vdot').forEach((dot, i) => {
      dot.classList.toggle('active', i === activeIdx);
    });
  }

  // ── Clipboard ──
  function copyChar(char, btn) {
    const flash = () => {
      btn.textContent = '✓';
      btn.classList.add('copied');
      setTimeout(() => { btn.textContent = 'COPY'; btn.classList.remove('copied'); }, 900);
    };
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(char).then(flash).catch(() => fallbackCopy(char, flash));
    } else {
      fallbackCopy(char, flash);
    }
  }

  function fallbackCopy(char, cb) {
    const ta = document.createElement('textarea');
    ta.value = char;
    ta.style.cssText = 'position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);
    ta.focus(); ta.select();
    try { document.execCommand('copy'); } catch (_) {}
    document.body.removeChild(ta);
    cb();
  }

})();
</script>
</body>
</html>
